# 周期股监控脚本配置文件
# ================================

## Tushare Token
# 从 https://tushare.pro 获取
TUSHARE_TOKEN = "你的Token"

## 飞书 Webhook
# 从飞书群组的机器人获取
# 群组 -> 机器人设置 -> 添加自定义机器人 -> 获取Webhook地址
FEISHU_WEBHOOK = "https://open.feishu.cn/open-apis/bot/v2/hook/..."

## 监控标的
# 三个周期股龙头标的：
# 1. 合盛硅业(603260) - 等Q1扣非转正 + MA20放量突破
# 2. 海螺水泥(600585) - 等MA20放量突破
# 3. 万华化学(600309) - 等缩量企稳 + 重回MA20

## 定时运行（cron表达式）
# 30 17 * * 1-5  # 每个工作日下午5:30
# 表示：每周一到五，下午17:30（收盘30分钟后）运行

## 信号级别说明
# 0 - 无信号
# 1 - 关注（均线走好/接近突破）
# 2 - 重要（站上MA20或MA60）
# 3 - 立即行动（放量突破MA20）

## 飞书消息推送说明
# - 常规日报：包含三只股票的技术面分析
# - 重要信号：当alert_level >= 2时自动推送
# - 买点信号：当alert_level == 3时额外推送醒目提醒
